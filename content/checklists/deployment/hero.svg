<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
<!--
  Deployment Readiness Checklist emblem.

  Visual metaphor: stage-by-stage gate progression. Five vertical
  bars represent five sequential gates of deploy readiness. Each
  bar starts empty (warm-neutral baseline only). Bars fill from
  BOTTOM-TO-TOP with terracotta IN SEQUENCE — bar 1 fills first,
  then bar 2 begins filling, then bar 3, etc. After all 5 are
  full, hold briefly (deploy complete), then all empty
  SIMULTANEOUSLY (next deploy starts), and the sequence repeats.

  Geometry:
    Bar width: 12
    Bar height: 50 (from y=20 to y=70)
    Bar spacing: gap of 8 between adjacent bars
    Bar 1: x=18  (centre at 24)
    Bar 2: x=38  (centre at 44)
    Bar 3: x=58  (centre at 64)
    Bar 4: x=78  (centre at 84)
    Bar 5: x=98  (centre at 104) — wait, that's beyond viewBox
    
    Let me recompute: 5 bars, each width 12, with gap 8
    Total: 5*12 + 4*8 = 92, centred in 120 viewBox
    Left margin: (120-92)/2 = 14
    Bar 1: x=14
    Bar 2: x=14+12+8 = 34
    Bar 3: x=14+2*(12+8) = 54
    Bar 4: x=14+3*(12+8) = 74
    Bar 5: x=14+4*(12+8) = 94
    Last bar right edge: 94+12 = 106 ✓ (within viewBox 0-120)

  Each bar is filled from bottom-to-top by animating the y and
  height of the terracotta foreground rectangle:
    Empty: y=70, height=0 (bottom of bar, no fill)
    Full:  y=20, height=50 (top of bar, full fill)
    
    During fill: y decreases from 70 to 20 while height increases
    from 0 to 50. The bottom edge stays at y=70.

  Animation: 7-second cycle.
    0.0–0.3s : All empty (start)
    0.3–1.4s : Bar 1 fills (y: 70→20, height: 0→50 over 1.1s)
    1.4–2.5s : Bar 2 fills
    2.5–3.6s : Bar 3 fills
    3.6–4.7s : Bar 4 fills
    4.7–5.8s : Bar 5 fills
    5.8–6.5s : All full (hold — deploy complete)
    6.5–7.0s : All empty simultaneously (snap reset)

  Motion mechanic: SEQUENTIAL VERTICAL FILL (the forty-fifth
  mechanic in the catalogue). Distinct from #35 independent
  metric oscillation which has FIVE VERTICAL bars CONTINUOUSLY
  OSCILLATING heights INDEPENDENTLY (each bar varies
  asynchronously within its own oscillation pattern, never
  fully filling, never fully emptying) — here FIVE VERTICAL
  bars FILL FULLY from BOTTOM-TO-TOP IN STRICT SEQUENCE, all
  reset to empty simultaneously, the architectural signature
  being SEQUENTIAL FILL (one after another) rather than
  INDEPENDENT OSCILLATION. Distinct from #28 disparate-rate
  progression (TWO HORIZONTAL bars filling at different rates)
  by being FIVE VERTICAL bars in STRICT SEQUENCE. Distinct
  from #14 scaling envelope (count of active rectangles in a
  HORIZONTAL row, DISCRETE on/off, count varying) by being
  CONTINUOUS fill of fixed VERTICAL bars in SEQUENTIAL order.

  Two colours only: warm neutral (#D6D2C8) for the always-visible
  bar baseline (faint outline), terracotta (#C96330) for the
  active fill of each bar.
-->

<!-- ─── Five bar baselines (warm neutral, always visible) ─── -->
<rect x="14" y="20" width="12" height="50" rx="1.5" fill="#D6D2C8" opacity="0.4"/>
<rect x="34" y="20" width="12" height="50" rx="1.5" fill="#D6D2C8" opacity="0.4"/>
<rect x="54" y="20" width="12" height="50" rx="1.5" fill="#D6D2C8" opacity="0.4"/>
<rect x="74" y="20" width="12" height="50" rx="1.5" fill="#D6D2C8" opacity="0.4"/>
<rect x="94" y="20" width="12" height="50" rx="1.5" fill="#D6D2C8" opacity="0.4"/>

<!-- ─── Subtle stage labels (small dots below each bar) ─── -->
<circle cx="20" cy="78" r="1.5" fill="#D6D2C8" opacity="0.6"/>
<circle cx="40" cy="78" r="1.5" fill="#D6D2C8" opacity="0.6"/>
<circle cx="60" cy="78" r="1.5" fill="#D6D2C8" opacity="0.6"/>
<circle cx="80" cy="78" r="1.5" fill="#D6D2C8" opacity="0.6"/>
<circle cx="100" cy="78" r="1.5" fill="#D6D2C8" opacity="0.6"/>

<!-- ─── Bar 1 fill (terracotta, animates y and height) ─── -->
<!-- Cycle phases:
       0.000–0.043 : empty (height=0, y=70)
       0.043–0.200 : fill (height: 0→50, y: 70→20)
       0.200–0.929 : full (height=50, y=20)
       0.929–1.000 : empty (snap reset)
-->
<rect x="14" width="12" rx="1.5" fill="#C96330" y="70" height="0">
  <animate attributeName="y"
           values="70; 70; 20; 20; 70"
           keyTimes="0; 0.043; 0.200; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
  <animate attributeName="height"
           values="0; 0; 50; 50; 0"
           keyTimes="0; 0.043; 0.200; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
</rect>

<!-- ─── Bar 2 fill (delayed start, fills next) ─── -->
<rect x="34" width="12" rx="1.5" fill="#C96330" y="70" height="0">
  <animate attributeName="y"
           values="70; 70; 20; 20; 70"
           keyTimes="0; 0.200; 0.357; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
  <animate attributeName="height"
           values="0; 0; 50; 50; 0"
           keyTimes="0; 0.200; 0.357; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
</rect>

<!-- ─── Bar 3 fill ─── -->
<rect x="54" width="12" rx="1.5" fill="#C96330" y="70" height="0">
  <animate attributeName="y"
           values="70; 70; 20; 20; 70"
           keyTimes="0; 0.357; 0.514; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
  <animate attributeName="height"
           values="0; 0; 50; 50; 0"
           keyTimes="0; 0.357; 0.514; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
</rect>

<!-- ─── Bar 4 fill ─── -->
<rect x="74" width="12" rx="1.5" fill="#C96330" y="70" height="0">
  <animate attributeName="y"
           values="70; 70; 20; 20; 70"
           keyTimes="0; 0.514; 0.671; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
  <animate attributeName="height"
           values="0; 0; 50; 50; 0"
           keyTimes="0; 0.514; 0.671; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
</rect>

<!-- ─── Bar 5 fill ─── -->
<rect x="94" width="12" rx="1.5" fill="#C96330" y="70" height="0">
  <animate attributeName="y"
           values="70; 70; 20; 20; 70"
           keyTimes="0; 0.671; 0.828; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
  <animate attributeName="height"
           values="0; 0; 50; 50; 0"
           keyTimes="0; 0.671; 0.828; 0.929; 1"
           dur="7s" repeatCount="indefinite"/>
</rect>
</svg>
