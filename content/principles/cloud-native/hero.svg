<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
<!--
  Cloud-Native Principles emblem.

  Visual metaphor: ELASTIC REPLICATION.
  A 3×3 grid of pod positions on a managed cluster (faint dashed
  boundary). The CENTER pod is always present — the persistent
  capability. Surrounding positions fill in as load arrives:
    - 4 cardinal positions (N, E, S, W) appear first
    - 4 corner positions join at peak load
    - corners fade first as load subsides
    - cardinals last, leaving only the centre
  The cycle visualises the defining cloud-native operational pattern:
  horizontal scaling — instances multiply under demand, recede when
  demand drops. The platform handles it; the application is the
  unit of replication.

  Motion mechanic: REPLICATION.
  Not particle flow, not oscillation, not rotation, not cross-fade —
  this is multiplicity. Pods APPEAR and DISAPPEAR in coordinated
  waves; nothing moves, nothing rotates, nothing transforms. Two
  staggered groups (cardinals + corners) appearing/fading creates
  the elastic rhythm.

  Two colours: warm neutral (#D6D2C8) for the cluster boundary,
  terracotta (#C96330) for the pods themselves.
-->

<!-- ─── Cluster boundary (faint, dashed — the platform's managed region) ─── -->
<rect x="14" y="14" width="92" height="62" rx="6"
      fill="none" stroke="#D6D2C8" stroke-width="0.8"
      opacity="0.32" stroke-dasharray="3 3"/>

<!-- ═══ CENTER POD — always present (the persistent capability) ═══ -->
<rect x="56" y="41" width="8" height="8" rx="1.5" fill="#C96330">
  <!-- subtle ambient pulse so it reads as alive -->
  <animate attributeName="opacity"
           values="1; 0.85; 1"
           keyTimes="0; 0.5; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- ═══ FOUR CARDINAL POSITIONS — appear at scale-up, fade at scale-down ═══
     keyTimes "0; 0.10; 0.20; 0.75; 0.83; 1":
       0–10%  invisible   (low load)
      10–20%  fading in   (scale-up wave 1)
      20–75%  fully visible (handling load)
      75–83%  fading out  (scale-down wave 2)
      83–100% invisible   (back to baseline) -->

<!-- North -->
<rect x="56" y="20" width="8" height="8" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 1; 1; 0; 0"
           keyTimes="0; 0.10; 0.20; 0.75; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- East -->
<rect x="92" y="41" width="8" height="8" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 1; 1; 0; 0"
           keyTimes="0; 0.12; 0.22; 0.73; 0.81; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- South -->
<rect x="56" y="62" width="8" height="8" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 1; 1; 0; 0"
           keyTimes="0; 0.10; 0.20; 0.75; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- West -->
<rect x="20" y="41" width="8" height="8" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 1; 1; 0; 0"
           keyTimes="0; 0.12; 0.22; 0.73; 0.81; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- ═══ FOUR CORNER POSITIONS — appear at peak, fade first ═══
     keyTimes "0; 0.22; 0.32; 0.62; 0.72; 1":
       0–22%  invisible
      22–32%  fading in   (wave 2 — peak load)
      32–62%  fully visible (only during peak)
      62–72%  fading out  (first to drop as load lifts)
      72–100% invisible -->

<!-- NE -->
<rect x="92" y="20" width="8" height="8" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 1; 1; 0; 0"
           keyTimes="0; 0.22; 0.32; 0.62; 0.72; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- SE -->
<rect x="92" y="62" width="8" height="8" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 1; 1; 0; 0"
           keyTimes="0; 0.24; 0.34; 0.60; 0.70; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- SW -->
<rect x="20" y="62" width="8" height="8" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 1; 1; 0; 0"
           keyTimes="0; 0.22; 0.32; 0.62; 0.72; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- NW -->
<rect x="20" y="20" width="8" height="8" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 1; 1; 0; 0"
           keyTimes="0; 0.24; 0.34; 0.60; 0.70; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>
</svg>
