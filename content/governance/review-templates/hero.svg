<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
<!--
  Review Templates emblem.

  Visual metaphor: the same template structure being reused for
  different reviews. A fixed 2x3 grid of cell outlines (the template's
  permanent structure) is always visible in warm neutral. Each cycle,
  a different SUBSET of cells fills with terracotta — representing
  the same template being filled in differently for different reviews.

  Three subsets cycle through over a 6-second period:
    Subset A (cycle 1): cells {top-left, middle-mid, bottom-right} fill
    Subset B (cycle 2): cells {top-mid, middle-right, bottom-left} fill
    Subset C (cycle 3): cells {top-right, middle-left, bottom-mid} fill

  Each subset holds for ~1.6s, then fades, with brief transition to
  the next subset.

  Grid geometry:
    Cell width: 22, height: 18
    Total grid: 66 wide, 54 tall, centred
    Grid origin: x=27, y=18 (so grid occupies 27–93 horizontal, 18–72 vertical)

    Cell positions:
      [0,0]=27,18 [0,1]=49,18 [0,2]=71,18    (top row)
      [1,0]=27,36 [1,1]=49,36 [1,2]=71,36    (middle row)
      [2,0]=27,54 [2,1]=49,54 [2,2]=71,54    (bottom row)

  Animation: 6-second cycle.
    0.0–0.10s : Subset A fades in
    0.10–1.70s : Subset A holds
    1.70–1.90s : Subset A fades out
    2.00–2.10s : Subset B fades in
    2.10–3.70s : Subset B holds
    3.70–3.90s : Subset B fades out
    4.00–4.10s : Subset C fades in
    4.10–5.70s : Subset C holds
    5.70–5.90s : Subset C fades out
    5.90–6.00s : pause before restart

  Motion mechanic: TEMPLATE REUSE PATTERN (the thirty-third mechanic
  in the catalogue). Distinct from #30 nearest-neighbor retrieval
  (CIRCULAR ring of 8 nodes around CENTRAL anchor, with CONNECTION
  LINES from selected subset to anchor) by having a RECTANGULAR
  2D GRID with NO central anchor and NO connection lines — the
  rectangular grid layout itself is the template structure. Distinct
  from #32 vertical cascade checklist (1D vertical column, cells fill
  SEQUENTIALLY top-to-bottom, all persist) by being 2D grid, cells
  filling in SUBSETS per cycle (not sequentially), with full clear
  between subsets.

  Two colours only: warm neutral (#D6D2C8) for the always-visible cell
  outlines and grid lines, terracotta (#C96330) for the filled subset
  cells per cycle.
-->

<!-- ─── Always-visible cell outlines (warm neutral) ─── -->
<!-- Top row -->
<rect x="27" y="18" width="22" height="18" rx="1.5" fill="none" stroke="#D6D2C8" stroke-width="1.4"/>
<rect x="49" y="18" width="22" height="18" rx="1.5" fill="none" stroke="#D6D2C8" stroke-width="1.4"/>
<rect x="71" y="18" width="22" height="18" rx="1.5" fill="none" stroke="#D6D2C8" stroke-width="1.4"/>
<!-- Middle row -->
<rect x="27" y="36" width="22" height="18" rx="1.5" fill="none" stroke="#D6D2C8" stroke-width="1.4"/>
<rect x="49" y="36" width="22" height="18" rx="1.5" fill="none" stroke="#D6D2C8" stroke-width="1.4"/>
<rect x="71" y="36" width="22" height="18" rx="1.5" fill="none" stroke="#D6D2C8" stroke-width="1.4"/>
<!-- Bottom row -->
<rect x="27" y="54" width="22" height="18" rx="1.5" fill="none" stroke="#D6D2C8" stroke-width="1.4"/>
<rect x="49" y="54" width="22" height="18" rx="1.5" fill="none" stroke="#D6D2C8" stroke-width="1.4"/>
<rect x="71" y="54" width="22" height="18" rx="1.5" fill="none" stroke="#D6D2C8" stroke-width="1.4"/>

<!-- ─── Subset A: top-left, middle-mid, bottom-right (cells [0,0], [1,1], [2,2]) ─── -->
<!-- Active during 0.0–1.9s of 6s cycle (keyTimes 0.0–0.317) -->
<rect x="27" y="18" width="22" height="18" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0.85; 0.85; 0; 0; 0; 0; 0"
           keyTimes="0; 0.017; 0.283; 0.317; 0.333; 0.667; 0.683; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>
<rect x="49" y="36" width="22" height="18" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0.85; 0.85; 0; 0; 0; 0; 0"
           keyTimes="0; 0.017; 0.283; 0.317; 0.333; 0.667; 0.683; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>
<rect x="71" y="54" width="22" height="18" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0.85; 0.85; 0; 0; 0; 0; 0"
           keyTimes="0; 0.017; 0.283; 0.317; 0.333; 0.667; 0.683; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- ─── Subset B: top-mid, middle-right, bottom-left (cells [0,1], [1,2], [2,0]) ─── -->
<!-- Active during 2.0–3.9s (keyTimes 0.333–0.65) -->
<rect x="49" y="18" width="22" height="18" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 0; 0; 0.85; 0.85; 0; 0"
           keyTimes="0; 0.300; 0.317; 0.350; 0.367; 0.617; 0.650; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>
<rect x="71" y="36" width="22" height="18" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 0; 0; 0.85; 0.85; 0; 0"
           keyTimes="0; 0.300; 0.317; 0.350; 0.367; 0.617; 0.650; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>
<rect x="27" y="54" width="22" height="18" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 0; 0; 0.85; 0.85; 0; 0"
           keyTimes="0; 0.300; 0.317; 0.350; 0.367; 0.617; 0.650; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- ─── Subset C: top-right, middle-left, bottom-mid (cells [0,2], [1,0], [2,1]) ─── -->
<!-- Active during 4.0–5.9s (keyTimes 0.667–0.983) -->
<rect x="71" y="18" width="22" height="18" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 0; 0; 0; 0; 0.85; 0.85; 0"
           keyTimes="0; 0.633; 0.650; 0.683; 0.700; 0.717; 0.733; 0.967; 0.983"
           dur="6s" repeatCount="indefinite"/>
</rect>
<rect x="27" y="36" width="22" height="18" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 0; 0; 0; 0; 0.85; 0.85; 0"
           keyTimes="0; 0.633; 0.650; 0.683; 0.700; 0.717; 0.733; 0.967; 0.983"
           dur="6s" repeatCount="indefinite"/>
</rect>
<rect x="49" y="54" width="22" height="18" rx="1.5" fill="#C96330" opacity="0">
  <animate attributeName="opacity"
           values="0; 0; 0; 0; 0; 0; 0.85; 0.85; 0"
           keyTimes="0; 0.633; 0.650; 0.683; 0.700; 0.717; 0.733; 0.967; 0.983"
           dur="6s" repeatCount="indefinite"/>
</rect>
</svg>
