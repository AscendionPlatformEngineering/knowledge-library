<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Percentile tail fan-out with budget threshold">
<!--
  Performance NFRs emblem.

  Visual metaphor: latency distribution observed at three percentiles
  (P50, P95, P99). All three traces start together at x=12 (request
  initiation) and grow rightward at different speeds, terminating at
  different x positions corresponding to their measured latency.
  P50 (median) reaches the shortest endpoint quickly. P95 reaches a
  middle endpoint. P99 reaches the longest endpoint, drawing the
  long-tail visualization that production systems exhibit. A fixed
  warm-neutral BUDGET marker at x=104 shows the specified latency
  ceiling. The three traces visibly fan out from a common origin to
  different endpoints, encoding the distribution shape rather than
  averaging it away. After all three reach their endpoints, the
  endpoint markers pulse on independent sub-cycles encoding ongoing
  measurement.

  Mechanic #66: PERCENTILE TAIL FAN-OUT.
  First mechanic to use three concurrent left-to-right traces from a
  shared origin to DIFFERENT endpoints, encoding distribution percentiles
  with a fixed budget threshold visible. Distinct from #60 stacked
  horizontal bar-fill cascade (4 sequential bars, not 3 concurrent;
  no shared origin), #61 paired-marker gap-arrow (paired markers
  with connecting line, no shared origin, no fan-out shape), #65
  sawtooth trace (single shaped polyline, not three traces).
  The architectural signature is distribution-shape exposure: the
  fan-out visibly shows that "average latency" hides tail behaviour.

  Geometry:
    Origin: x=12, all three traces share start point.
    Trace endpoints (encoding latency increasing P50 < P95 < P99):
      P50 trace at y=24, ends at x=42.
      P95 trace at y=46, ends at x=78.
      P99 trace at y=68, ends at x=98.
    Budget marker (warm-neutral): vertical short line at x=104,
                                   y=14 to y=78.

  Cycle: 8s; sub-cycles 1.0s/1.4s/1.8s for endpoint pulses.
    0.00–0.05  Empty / reset
    0.05–0.10  Budget marker fades in
    0.10–0.20  All three traces grow simultaneously (P50 reaches x=42;
                P95 reaches x=78; P99 reaches x=98)
    0.20–0.85  Held; endpoint markers pulse on independent sub-cycles
    0.85–0.95  Fade out
    0.95–1.00  Cleared, reset

  Colour: warm-neutral #D6D2C8 + terracotta #C96330.
-->

  <!-- Budget threshold (warm-neutral vertical mark at x=104) -->
  <line x1="104" y1="14" x2="104" y2="78" stroke="#D6D2C8" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="2 3" opacity="0">
    <animate attributeName="opacity"
             values="0;0;0.7;0.7;0"
             keyTimes="0;0.05;0.10;0.85;0.95"
             dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- P50 trace (top, shortest — median latency) -->
  <line x1="12" y1="24" x2="12" y2="24" stroke="#C96330" stroke-width="2.6" stroke-linecap="round">
    <animate attributeName="x2"
             values="12;12;42;42;12"
             keyTimes="0;0.10;0.20;0.85;0.95"
             dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- P50 endpoint marker -->
  <circle cx="42" cy="24" r="2.6" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.18;0.22;0.85;0.92"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="r"
             values="2.6;3.6;2.6"
             keyTimes="0;0.5;1"
             dur="1.0s" repeatCount="indefinite"/>
  </circle>

  <!-- P95 trace (middle — tail-of-distribution start) -->
  <line x1="12" y1="46" x2="12" y2="46" stroke="#C96330" stroke-width="2.6" stroke-linecap="round">
    <animate attributeName="x2"
             values="12;12;78;78;12"
             keyTimes="0;0.10;0.20;0.85;0.95"
             dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- P95 endpoint marker -->
  <circle cx="78" cy="46" r="2.6" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.18;0.22;0.85;0.92"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="r"
             values="2.6;3.6;2.6"
             keyTimes="0;0.5;1"
             dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- P99 trace (bottom, longest — long-tail latency, near budget) -->
  <line x1="12" y1="68" x2="12" y2="68" stroke="#C96330" stroke-width="2.6" stroke-linecap="round">
    <animate attributeName="x2"
             values="12;12;98;98;12"
             keyTimes="0;0.10;0.20;0.85;0.95"
             dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- P99 endpoint marker (close to budget — visible tension) -->
  <circle cx="98" cy="68" r="2.6" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.18;0.22;0.85;0.92"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="r"
             values="2.6;3.6;2.6"
             keyTimes="0;0.5;1"
             dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
