<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dual-node failover alternation with heartbeat">
<!--
  Reliability NFRs emblem.

  Visual metaphor: active/standby reliability via two nodes that
  alternate which is serving traffic. A primary node sits at left
  (cx=32, cy=45). A standby node sits at right (cx=88, cy=45). A
  horizontal "heartbeat" line connects them. Initially primary is
  bright (terracotta, full opacity, larger radius pulsing) and
  standby is dim (warm-neutral, low opacity, static smaller radius).
  At t=0.40 the primary fails (fades to dim) and the standby
  simultaneously brightens (becomes active terracotta). At t=0.75
  primary recovers and standby returns to dim. The alternation
  encodes failover-and-recovery as a designed reliability pattern.
  The heartbeat line pulses opacity gently throughout, encoding the
  ongoing health-check that drives the failover decision.

  Mechanic #67: DUAL-NODE FAILOVER ALTERNATION.
  First mechanic to use TWO discrete nodes that alternate active/
  inactive states with simultaneous opposite transitions, connected
  by a continuous heartbeat line. Distinct from #62 spoke convergence
  (multiple spokes converging to one node, not alternating roles),
  #65 sawtooth trace (single trace shape, no two-node structure),
  #66 percentile fan-out (three traces from shared origin, no
  alternation). The architectural signature is reliability-as-
  redundancy: traffic moves between nodes, individual node failure
  does not cause system failure, the system as a whole maintains
  availability through alternation.

  Geometry:
    Primary node:  circle r=8 at (32, 45).
    Standby node:  circle r=8 at (88, 45).
    Heartbeat line: horizontal, y=45, x=40 to x=80 (between nodes).

  Cycle: 8s.
    0.00–0.05  Empty / reset
    0.05–0.10  Both nodes appear (primary bright, standby dim);
                heartbeat line appears
    0.10–0.40  Primary serving (bright, pulsing); standby cold (dim);
                heartbeat pulsing slow
    0.40–0.45  FAILOVER: primary fades; standby brightens simultaneously
    0.45–0.75  Standby serving (bright, pulsing); primary cold (dim);
                heartbeat pulsing slow
    0.75–0.80  RECOVERY: primary brightens; standby fades simultaneously
    0.80–0.90  Primary serving again
    0.90–0.95  All fade out
    0.95–1.00  Cleared, reset
  Heartbeat sub-cycle: 0.8s opacity pulse continuously.

  Colour: warm-neutral #D6D2C8 + terracotta #C96330.
-->

  <!-- Heartbeat connecting line (thin, pulsing opacity) -->
  <line x1="40" y1="45" x2="80" y2="45" stroke="#D6D2C8" stroke-width="1.2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity"
             values="0;0;0.5;0.5;0"
             keyTimes="0;0.05;0.10;0.90;0.95"
             dur="8s" repeatCount="indefinite"/>
    <!-- Sub-cycle: slow pulse of opacity continuously -->
    <animate attributeName="stroke-width"
             values="1.2;2.0;1.2"
             keyTimes="0;0.5;1"
             dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- ============== PRIMARY NODE (left, x=32) ============== -->
  <!-- Background dim representation (warm-neutral, always visible) -->
  <circle cx="32" cy="45" r="8" fill="#D6D2C8" opacity="0">
    <animate attributeName="opacity"
             values="0;0;0.4;0.4;0"
             keyTimes="0;0.05;0.10;0.90;0.95"
             dur="8s" repeatCount="indefinite"/>
  </circle>
  <!-- Active overlay: bright when primary is serving (0.10-0.40 and 0.80-0.90) -->
  <circle cx="32" cy="45" r="8" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0;0;1;1;0"
             keyTimes="0;0.10;0.15;0.40;0.45;0.80;0.85;0.90;0.95"
             dur="8s" repeatCount="indefinite"/>
    <!-- Active pulse via radius -->
    <animate attributeName="r"
             values="8;9.5;8"
             keyTimes="0;0.5;1"
             dur="1.0s" repeatCount="indefinite"/>
  </circle>

  <!-- ============== STANDBY NODE (right, x=88) ============== -->
  <!-- Background dim representation -->
  <circle cx="88" cy="45" r="8" fill="#D6D2C8" opacity="0">
    <animate attributeName="opacity"
             values="0;0;0.4;0.4;0"
             keyTimes="0;0.05;0.10;0.90;0.95"
             dur="8s" repeatCount="indefinite"/>
  </circle>
  <!-- Active overlay: bright during failover window (0.45-0.75) -->
  <circle cx="88" cy="45" r="8" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.45;0.50;0.75;0.80"
             dur="8s" repeatCount="indefinite"/>
    <!-- Active pulse via radius -->
    <animate attributeName="r"
             values="8;9.5;8"
             keyTimes="0;0.5;1"
             dur="1.0s" repeatCount="indefinite"/>
  </circle>
</svg>
