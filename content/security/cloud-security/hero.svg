<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
<!--
  Cloud Security emblem.

  Visual metaphor: a protected asset at the centre, surrounded by
  concentric defensive rings that expand and contract in unison —
  the breathing rhythm of layered cloud-security controls (org SCPs,
  CSPM, CIEM, CWPP) maintaining a protective envelope around the
  workload. All rings remain persistently visible; the protection
  is never absent, only modulated in scope.

  Animation: 6-second cycle where all three rings' radii grow from
  baseline, hold at expanded, contract back, hold at baseline.
    Inner ring:  r oscillates 12 ↔ 18
    Middle ring: r oscillates 22 ↔ 28
    Outer ring:  r oscillates 32 ↔ 38
  All three move IN UNISON — same keyTimes, synchronised expansion
  and contraction. The breathing is unified, not staggered.

  Motion mechanic: SHIELD ENVELOPE PULSATION (the twenty-fourth
  mechanic in the catalogue). Distinct from #9 concentric perimeter
  tracing (which DRAWS rings into existence via stroke-dashoffset
  with sequential timing — each ring traces in turn) by animating
  RADIUS rather than path. Distinct from #12 wave propagation
  (a SINGLE ring expanding centrifugally from a source and
  disappearing) by being MULTIPLE persistent rings that move together
  and never disappear.

  Two colours only: warm neutral (#D6D2C8) for the rings and central
  asset's outer fill, terracotta (#C96330) for the protected core
  and ring strokes.
-->

<!-- ─── Outer ring: r=32 ↔ 38 ─── -->
<circle cx="60" cy="45" r="32" fill="none" stroke="#D6D2C8" stroke-width="1.4">
  <animate attributeName="r"
           values="32; 38; 38; 32; 32"
           keyTimes="0; 0.30; 0.50; 0.80; 1"
           dur="6s" repeatCount="indefinite"/>
</circle>

<!-- ─── Middle ring: r=22 ↔ 28 ─── -->
<circle cx="60" cy="45" r="22" fill="none" stroke="#C96330" stroke-width="1.6" opacity="0.7">
  <animate attributeName="r"
           values="22; 28; 28; 22; 22"
           keyTimes="0; 0.30; 0.50; 0.80; 1"
           dur="6s" repeatCount="indefinite"/>
</circle>

<!-- ─── Inner ring: r=12 ↔ 18 ─── -->
<circle cx="60" cy="45" r="12" fill="none" stroke="#C96330" stroke-width="1.8">
  <animate attributeName="r"
           values="12; 18; 18; 12; 12"
           keyTimes="0; 0.30; 0.50; 0.80; 1"
           dur="6s" repeatCount="indefinite"/>
</circle>

<!-- ─── Protected asset at centre (persistent) ─── -->
<rect x="54" y="39" width="12" height="12" rx="2" fill="#C96330" stroke="#C96330" stroke-width="1"/>
</svg>
